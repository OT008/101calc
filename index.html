<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okey 101 Çetele</title>
  <style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    body { font-family: "Segoe UI", sans-serif; background: #f3f6fb; color: #2c3e50; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.1); overflow: hidden; }
    .hidden { display: none !important; }

    .mode-wrap { padding: 24px; text-align: center; }
    .mode-wrap h1 { margin: 0 0 16px; font-size: 24px; color: #2c3e50; }
    .mode-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: #4a90e2; color: #fff; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    .btn-primary:hover { background: #357abd; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #e6e6e6; }
    .toolbar .mode-label { font-weight: 700; color: #4a90e2; }
    .btn-danger { background: #e74c3c; color: #fff; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; text-align: center; vertical-align: top; padding: 8px; }
    th { background: #4a90e2; color: #fff; font-weight: 700; font-size: 15px; }
    .name-input { background: transparent; border: none; outline: none; color: #fff; text-align: center; width: 100%; font-weight: 700; }

    .player-cell { background: #f9f9f9; border-radius: 6px; padding: 6px; }
    .kategori { border: 1px solid #eee; background: #fff; margin-bottom: 6px; border-radius: 6px; padding: 4px; }
    .kategori h4 { margin: 4px 0; color: #4a90e2; font-size: 12px; }

    .secenek, .masa-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 28px; padding: 4px 12px; box-sizing: border-box;
      background: #4a90e2; color: #fff; border-radius: 6px; margin: 2px;
      cursor: pointer; font-weight: 600; font-size: 13px; user-select: none;
    }
    .secenek:hover, .masa-btn:hover { background: #357abd; }
    .secenek.aktif, .masa-btn.aktif { background: #2ecc71; }

    .kalan-input {
      width: 58px; text-align: center; font-weight: 700; color: #fff;
      background: #4a90e2; border: none; outline: none; border-radius: 6px; font-size: 13px;
      min-height: 28px;
    }

    .ceza-satiri { margin: 4px 0; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; }
    .ceza-satiri button { width: 24px; height: 24px; border: none; border-radius: 5px; color: #fff; font-weight: 700; cursor: pointer; }
    .ceza-satiri .azalt { background: #e74c3c; }
    .ceza-satiri .artir { background: #2ecc71; }

    .pasif { pointer-events: none !important; opacity: .5 !important; }

    tfoot td { background: #eef4ff; font-weight: 700; font-size: 15px; border-top: 2px solid #4a90e2; }
    tfoot td:first-child { background: #4a90e2; color: #fff; }
    .team-total-label { background: #6c7a89 !important; color: #fff; }
    .total-high { background: #e74c3c !important; color: #fff !important; }
    .total-low { background: #2ecc71 !important; color: #fff !important; }
  </style>
</head>
<body>
  <div class="container">
    <div id="modeWrap" class="mode-wrap">
      <h1>Okey 101 Çetele</h1>
      <div class="mode-actions">
        <button id="btnOyuncu" class="btn-primary">Oyuncu Bazlı</button>
        <button id="btnTakim" class="btn-primary">Takım Bazlı</button>
      </div>
    </div>

    <div id="gameWrap" class="hidden">
      <div class="toolbar">
        <div class="mode-label" id="modeLabel"></div>
        <button id="btnYeniOyun" class="btn-danger">Yeni Oyun</button>
      </div>
      <table id="scoreTable"></table>
    </div>
  </div>

  <script>
    const LS_KEY = 'okey101_state_v3';
    const CEZA_LIST = ['İşlek', 'Hatalı Açma', 'Okey Kaptırma'];
    const memoryStorage = {};
    let mode = null; // player | team

    const modeWrap = document.getElementById('modeWrap');
    const gameWrap = document.getElementById('gameWrap');
    const modeLabel = document.getElementById('modeLabel');
    const scoreTable = document.getElementById('scoreTable');

    function storageSet(key, value) {
      try { localStorage.setItem(key, value); return; } catch {}
      try { sessionStorage.setItem(key, value); return; } catch {}
      memoryStorage[key] = value;
    }
    function storageGet(key) {
      try {
        const v = localStorage.getItem(key);
        if (v !== null) return v;
      } catch {}
      try {
        const v = sessionStorage.getItem(key);
        if (v !== null) return v;
      } catch {}
      return memoryStorage[key] || null;
    }
    function storageRemove(key) {
      try { localStorage.removeItem(key); } catch {}
      try { sessionStorage.removeItem(key); } catch {}
      delete memoryStorage[key];
    }

    function createCell() {
      const td = document.createElement('td');
      td.className = 'player-cell';
      td.innerHTML = `
        <div class="kategori acma-kat">
          <h4>Açma Durumu</h4>
          <div class="secenek" data-role="acmadi">Açamadı</div>
          <div class="secenek" data-role="kalan">Kalan</div>
          <div class="secenek" data-role="bitti">Bitti</div>
        </div>
        <div class="kategori ceza-kat">
          <h4>Cezalar</h4>
          <div class="masa-btn">Masa Sayısı</div>
          ${CEZA_LIST.map(c => `<div class="ceza-satiri">${c}: <button class="azalt">-</button><span>0</span><button class="artir">+</button></div>`).join('')}
        </div>`;
      return td;
    }

    function createHeader(colCount, names = []) {
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      tr.innerHTML = `<th>El</th>`;
      for (let i = 0; i < colCount; i++) {
        const th = document.createElement('th');
        const placeholder = mode === 'player' ? `Oyuncu ${i + 1}` : `Takım ${i + 1}`;
        const name = names[i] || '';
        th.innerHTML = `<input class="name-input" data-name-index="${i}" placeholder="${placeholder}" value="${name}">`;
        tr.appendChild(th);
      }
      thead.appendChild(tr);
      return thead;
    }

    function createRow(elNo, colCount) {
      const tr = document.createElement('tr');
      const first = document.createElement('td');
      first.innerHTML = `<b>${elNo}</b>`;
      tr.appendChild(first);
      for (let i = 0; i < colCount; i++) tr.appendChild(createCell());
      return tr;
    }

    function buildTable(initial = null) {
      const colCount = mode === 'player' ? 4 : 2;
      scoreTable.innerHTML = '';
      scoreTable.appendChild(createHeader(colCount, initial?.names || []));

      const tbody = document.createElement('tbody');
      const rows = Math.max(1, initial?.rowCount || 1);
      for (let i = 1; i <= rows; i++) tbody.appendChild(createRow(i, colCount));
      scoreTable.appendChild(tbody);

      const tfoot = document.createElement('tfoot');
      const totalRow = document.createElement('tr');
      totalRow.className = 'totals-main';
      totalRow.innerHTML = `<td>Toplam</td>${Array(colCount).fill('<td>0</td>').join('')}`;
      tfoot.appendChild(totalRow);

      if (mode === 'player') {
        const teamRow = document.createElement('tr');
        teamRow.className = 'totals-team';
        teamRow.innerHTML = '<td class="team-total-label">Takım Toplamı</td><td colspan="2">0</td><td colspan="2">0</td>';
        tfoot.appendChild(teamRow);
      }
      scoreTable.appendChild(tfoot);
    }

    function getCellMarkState(cell) {
      const acmadi = cell.querySelector('[data-role="acmadi"].aktif');
      const bitti = cell.querySelector('[data-role="bitti"].aktif');
      const masa = cell.querySelector('.masa-btn.aktif');
      const kalanInput = cell.querySelector('.kalan-input');
      const kalanVal = kalanInput?.value?.trim() || '';
      let cezaVar = false;
      cell.querySelectorAll('.ceza-satiri span').forEach(sp => { if ((parseInt(sp.textContent || '0', 10) || 0) > 0) cezaVar = true; });
      return Boolean(acmadi || bitti || masa || kalanVal || cezaVar);
    }

    function getMateIndex(i) {
      if (mode !== 'player') return -1;
      if (i === 0) return 1;
      if (i === 1) return 0;
      if (i === 2) return 3;
      if (i === 3) return 2;
      return -1;
    }

    function cellSayildiMi(row, idx) {
      const cells = Array.from(row.querySelectorAll('.player-cell'));
      const cell = cells[idx];
      if (!cell) return false;
      if (getCellMarkState(cell)) return true;

      if (mode === 'player') {
        const mateIdx = getMateIndex(idx);
        if (mateIdx >= 0) {
          const mateCell = cells[mateIdx];
          if (mateCell?.querySelector('[data-role="bitti"].aktif')) return true;
        }
      }
      return false;
    }

    function lastRowComplete() {
      const rows = scoreTable.querySelectorAll('tbody tr');
      const last = rows[rows.length - 1];
      if (!last) return false;
      const cells = last.querySelectorAll('.player-cell');
      return Array.from(cells).every((_, i) => cellSayildiMi(last, i));
    }

    function addNewRow() {
      const tbody = scoreTable.querySelector('tbody');
      const nextNo = tbody.querySelectorAll('tr').length + 1;
      tbody.appendChild(createRow(nextNo, mode === 'player' ? 4 : 2));
      applyRowLocks();
    }

    function applyRowLocks() {
      const rows = Array.from(scoreTable.querySelectorAll('tbody tr'));
      if (!rows.length) return;
      const lastIdx = rows.length - 1;
      rows.forEach((row, idx) => {
        const lock = idx < lastIdx - 1;
        if (lock) {
          row.querySelectorAll('.secenek, .masa-btn, .artir, .azalt, .kalan-input').forEach(el => el.classList.add('pasif'));
          return;
        }
        if (idx === lastIdx - 1) {
          const shouldLock = Array.from(rows[lastIdx].querySelectorAll('.player-cell')).some(getCellMarkState);
          row.querySelectorAll('.secenek, .masa-btn, .artir, .azalt, .kalan-input').forEach(el => el.classList.toggle('pasif', shouldLock));
          return;
        }
        row.querySelectorAll('.secenek, .masa-btn, .artir, .azalt, .kalan-input').forEach(el => el.classList.remove('pasif'));
      });
    }

    function ensureKalanButton(cell) {
      const acmaKat = cell.querySelector('.acma-kat');
      if (!acmaKat) return null;
      let kalanBtn = acmaKat.querySelector('[data-role="kalan"]');
      if (kalanBtn) return kalanBtn;

      kalanBtn = document.createElement('div');
      kalanBtn.className = 'secenek';
      kalanBtn.dataset.role = 'kalan';
      kalanBtn.textContent = 'Kalan';
      const bittiBtn = acmaKat.querySelector('[data-role="bitti"]');
      if (bittiBtn) bittiBtn.insertAdjacentElement('beforebegin', kalanBtn);
      else acmaKat.appendChild(kalanBtn);
      return kalanBtn;
    }

    function clearCellAcma(cell) {
      const acmadi = cell.querySelector('[data-role="acmadi"]');
      const kalanBtn = ensureKalanButton(cell);
      const bitti = cell.querySelector('[data-role="bitti"]');
      const input = cell.querySelector('.kalan-input');
      const ekstra = cell.querySelector('.bitti-ekstra');
      if (acmadi) { acmadi.classList.remove('aktif'); acmadi.style.display = 'inline-flex'; }
      if (kalanBtn) kalanBtn.style.display = 'inline-flex';
      if (bitti) { bitti.classList.remove('aktif'); bitti.style.display = 'inline-flex'; }
      if (input) input.remove();
      if (ekstra) ekstra.remove();
    }

    function handleAcmadi(btn) {
      if (btn.classList.contains('pasif')) return;
      const cell = btn.closest('.player-cell');
      const kalan = cell.querySelector('[data-role="kalan"]');
      const bitti = cell.querySelector('[data-role="bitti"]');
      const masa = cell.querySelector('.masa-btn');
      const active = btn.classList.toggle('aktif');
      if (active) {
        const input = cell.querySelector('.kalan-input'); if (input) input.remove();
        if (kalan) kalan.style.display = 'none';
        if (bitti) bitti.style.display = 'none';
        if (masa) masa.style.display = 'none';
      } else {
        if (kalan) kalan.style.display = 'inline-flex';
        if (bitti) bitti.style.display = 'inline-flex';
        if (masa) masa.style.display = 'inline-flex';
      }
    }

    function handleKalan(btn) {
      if (btn.classList.contains('pasif')) return;
      const cell = btn.closest('.player-cell');
      const acmadi = cell.querySelector('[data-role="acmadi"]');
      const bitti = cell.querySelector('[data-role="bitti"]');
      if (acmadi) acmadi.style.display = 'none';
      if (bitti) bitti.style.display = 'none';

      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'kalan-input';
      input.min = '1';
      input.max = '252';
      input.placeholder = '0';
      btn.replaceWith(input);
      input.focus();

      input.addEventListener('blur', () => {
        const v = parseInt(input.value || '0', 10) || 0;
        if (v < 1) {
          input.replaceWith(btn);
          if (acmadi) acmadi.style.display = 'inline-flex';
          if (bitti) bitti.style.display = 'inline-flex';
        } else {
          input.value = String(Math.min(252, v));
        }
        afterAnyChange();
      });
    }

    function shouldHideBittiForCell(cell) {
      const acmadiAktif = !!cell.querySelector('[data-role="acmadi"].aktif');
      const kalanInput = cell.querySelector('.kalan-input');
      const kalanDolu = !!(kalanInput && kalanInput.value.trim() !== '');
      return acmadiAktif || kalanDolu;
    }

    function refreshBittiVisibility(row) {
      if (!row) return;
      const cells = Array.from(row.querySelectorAll('.player-cell'));
      const activeBittiCell = cells.find(c => c.querySelector('[data-role="bitti"].aktif'));

      cells.forEach(cell => {
        const bittiBtn = cell.querySelector('[data-role="bitti"]');
        if (!bittiBtn) return;
        if (bittiBtn.classList.contains('aktif')) {
          bittiBtn.style.display = 'inline-flex';
          return;
        }

        if (activeBittiCell) {
          bittiBtn.style.display = 'none';
          return;
        }

        bittiBtn.style.display = shouldHideBittiForCell(cell) ? 'none' : 'inline-flex';
      });
    }

    function handleBitti(btn) {
      if (btn.classList.contains('pasif')) return;
      const cell = btn.closest('.player-cell');
      const row = cell.closest('tr');
      const acmadi = cell.querySelector('[data-role="acmadi"]');
      const kalan = cell.querySelector('[data-role="kalan"]');
      const wasActive = btn.classList.contains('aktif');

      if (!wasActive) {
        row.querySelectorAll('[data-role="bitti"].aktif').forEach(b => {
          if (b !== btn) {
            b.classList.remove('aktif');
            const c = b.closest('.player-cell');
            c.querySelector('.bitti-ekstra')?.remove();
          }
        });
        btn.classList.add('aktif');
        if (acmadi) acmadi.style.display = 'none';
        if (kalan) kalan.style.display = 'none';
        if (!cell.querySelector('.bitti-ekstra')) {
          const ex = document.createElement('div');
          ex.className = 'bitti-ekstra';
          ex.style.marginTop = '6px';
          ex.innerHTML = '<div class="secenek okey">Okey ile</div><div class="secenek elden">Elden</div>';
          cell.querySelector('.acma-kat').insertAdjacentElement('afterend', ex);
        }
      } else {
        btn.classList.remove('aktif');
        cell.querySelector('.bitti-ekstra')?.remove();
        if (acmadi) acmadi.style.display = 'inline-flex';
        if (kalan) kalan.style.display = 'inline-flex';
      }
    }

    function applyPlayerMateVisibility(row) {
      if (mode !== 'player') return;
      const cells = Array.from(row.querySelectorAll('.player-cell'));
      if (cells.length !== 4) return;

      const bitenIndex = cells.findIndex(c => c.querySelector('[data-role="bitti"].aktif'));
      cells.forEach((cell, idx) => {
        const acmaKat = cell.querySelector('.acma-kat');
        if (!acmaKat) return;
        if (bitenIndex !== -1 && (idx === ((bitenIndex % 2 === 0) ? bitenIndex + 1 : bitenIndex - 1))) {
          acmaKat.style.display = 'none';
          const kalInput = cell.querySelector('.kalan-input');
          if (kalInput) kalInput.remove();
          const ac = cell.querySelector('[data-role="acmadi"]');
          const ka = ensureKalanButton(cell);
          const bi = cell.querySelector('[data-role="bitti"]');
          if (ac) { ac.classList.remove('aktif'); ac.style.display = 'inline-flex'; }
          if (ka) ka.style.display = 'inline-flex';
          if (bi) { bi.classList.remove('aktif'); bi.style.display = 'inline-flex'; }
        } else {
          acmaKat.style.display = 'block';
        }
      });
    }

    function applyTotalsHighlight(totals) {
      const mainTds = Array.from(scoreTable.querySelectorAll('tfoot .totals-main td')).slice(1);
      const teamTds = Array.from(scoreTable.querySelectorAll('tfoot .totals-team td'));

      mainTds.forEach(td => td.classList.remove('total-high', 'total-low'));
      teamTds.forEach(td => td.classList.remove('total-high', 'total-low'));

      if (mode === 'player') {
        if (teamTds.length < 3 || totals.length < 4) return;
        const t1 = totals[0] + totals[1];
        const t2 = totals[2] + totals[3];
        if (t1 === t2) return;
        if (t1 > t2) {
          teamTds[1].classList.add('total-high');
          teamTds[2].classList.add('total-low');
        } else {
          teamTds[2].classList.add('total-high');
          teamTds[1].classList.add('total-low');
        }
        return;
      }

      if (!mainTds.length || !totals.length) return;
      const max = Math.max(...totals);
      const min = Math.min(...totals);
      if (max === min) return;
      mainTds.forEach((td, i) => {
        if (totals[i] === max) td.classList.add('total-high');
        if (totals[i] === min) td.classList.add('total-low');
      });
    }

    function calculateScores() {
      const rows = Array.from(scoreTable.querySelectorAll('tbody tr'));
      const colCount = mode === 'player' ? 4 : 2;
      const totals = Array(colCount).fill(0);

      rows.forEach(row => {
        applyPlayerMateVisibility(row);
        const cells = Array.from(row.querySelectorAll('.player-cell'));
        const hand = Array(colCount).fill(0);
        let bittiIndex = null;
        let mult = 1;

        cells.forEach((cell, i) => {
          const bitti = cell.querySelector('[data-role="bitti"].aktif');
          if (bitti) {
            bittiIndex = i;
            const okey = cell.querySelector('.okey.aktif');
            const elden = cell.querySelector('.elden.aktif');
            if (okey && elden) mult = 4;
            else if (okey || elden) mult = 2;
          }
        });

        cells.forEach((cell, i) => {
          const acmadi = cell.querySelector('[data-role="acmadi"].aktif');
          const bitti = cell.querySelector('[data-role="bitti"].aktif');
          const kalan = cell.querySelector('.kalan-input');
          const masa = cell.querySelector('.masa-btn.aktif');
          const okey = cell.querySelector('.okey.aktif');
          const elden = cell.querySelector('.elden.aktif');

          let p = 0;
          if (acmadi) p += 202;
          else if (kalan?.value) p += parseInt(kalan.value, 10) || 0;
          else if (bitti) {
            if (okey && elden) p -= 202;
            else if (okey) p -= 101;
            else if (elden) p -= 202;
            else p -= 101;
          }

          if (masa) p -= 101;
          cell.querySelectorAll('.ceza-satiri span').forEach(sp => {
            p += (parseInt(sp.textContent || '0', 10) || 0) * 101;
          });
          hand[i] = p;
        });

        if (mode === 'player' && bittiIndex !== null) {
          const mate = (bittiIndex % 2 === 0) ? bittiIndex + 1 : bittiIndex - 1;
          if (cells[mate]) {
            let matePenalty = 0;
            const masa = cells[mate].querySelector('.masa-btn.aktif');
            if (masa) matePenalty -= 101;
            cells[mate].querySelectorAll('.ceza-satiri span').forEach(sp => { matePenalty += (parseInt(sp.textContent || '0', 10) || 0) * 101; });
            hand[mate] = matePenalty;
          }
          cells.forEach((cell, i) => {
            if (i === bittiIndex || i === mate) return;
            const acmadi = cell.querySelector('[data-role="acmadi"].aktif');
            const kalan = cell.querySelector('.kalan-input');
            let extra = 0;
            if (acmadi) extra = 202;
            else if (kalan?.value) extra = parseInt(kalan.value, 10) || 0;
            hand[i] += extra * (mult - 1);
          });
        }

        hand.forEach((p, i) => totals[i] += p);
      });

      const mainTds = scoreTable.querySelectorAll('tfoot .totals-main td');
      totals.forEach((v, i) => { if (mainTds[i + 1]) mainTds[i + 1].textContent = String(v); });
      applyTotalsHighlight(totals);

      if (mode === 'player') {
        const teamTds = scoreTable.querySelectorAll('tfoot .totals-team td');
        teamTds[1].textContent = String(totals[0] + totals[1]);
        teamTds[2].textContent = String(totals[2] + totals[3]);
      }
    }

    function afterAnyChange() {
      if (lastRowComplete()) addNewRow();
      scoreTable.querySelectorAll('tbody tr').forEach(refreshBittiVisibility);
      applyRowLocks();
      calculateScores();
      saveState();
    }

    function serializeState() {
      const names = Array.from(scoreTable.querySelectorAll('.name-input')).map(i => i.value || '');
      const rows = Array.from(scoreTable.querySelectorAll('tbody tr')).map(row => {
        return Array.from(row.querySelectorAll('.player-cell')).map(cell => {
          const ceza = Array.from(cell.querySelectorAll('.ceza-satiri span')).map(s => parseInt(s.textContent || '0', 10) || 0);
          return {
            acmadi: !!cell.querySelector('[data-role="acmadi"].aktif'),
            bitti: !!cell.querySelector('[data-role="bitti"].aktif'),
            okey: !!cell.querySelector('.okey.aktif'),
            elden: !!cell.querySelector('.elden.aktif'),
            masa: !!cell.querySelector('.masa-btn.aktif'),
            kalan: cell.querySelector('.kalan-input')?.value || '',
            ceza
          };
        });
      });
      return { mode, names, rows };
    }

    function applyCellState(cell, s) {
      clearCellAcma(cell);

      const masaBtn = cell.querySelector('.masa-btn');
      if (masaBtn) masaBtn.classList.toggle('aktif', !!s.masa);
      const spans = cell.querySelectorAll('.ceza-satiri span');
      s.ceza?.forEach((v, i) => { if (spans[i]) spans[i].textContent = String(v || 0); });

      const acmadiBtn = cell.querySelector('[data-role="acmadi"]');
      const kalanBtn = cell.querySelector('[data-role="kalan"]');
      const bittiBtn = cell.querySelector('[data-role="bitti"]');

      if (s.acmadi && acmadiBtn) {
        acmadiBtn.classList.add('aktif');
        if (kalanBtn) kalanBtn.style.display = 'none';
        if (bittiBtn) bittiBtn.style.display = 'none';
        if (masaBtn) masaBtn.style.display = 'none';
        return;
      }

      if (s.kalan && kalanBtn) {
        if (acmadiBtn) acmadiBtn.style.display = 'none';
        if (bittiBtn) bittiBtn.style.display = 'none';
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'kalan-input';
        input.min = '1';
        input.max = '252';
        input.placeholder = '0';
        input.value = String(s.kalan);
        kalanBtn.replaceWith(input);
        input.addEventListener('blur', () => {
          const v = parseInt(input.value || '0', 10) || 0;
          if (v < 1) {
            input.replaceWith(kalanBtn);
            if (acmadiBtn) acmadiBtn.style.display = 'inline-flex';
            if (bittiBtn) bittiBtn.style.display = 'inline-flex';
          } else {
            input.value = String(Math.min(252, v));
          }
          afterAnyChange();
        });
        return;
      }

      if (s.bitti && bittiBtn) {
        bittiBtn.classList.add('aktif');
        if (acmadiBtn) acmadiBtn.style.display = 'none';
        if (kalanBtn) kalanBtn.style.display = 'none';
        const ex = document.createElement('div');
        ex.className = 'bitti-ekstra';
        ex.style.marginTop = '6px';
        ex.innerHTML = `<div class="secenek okey ${s.okey ? 'aktif' : ''}">Okey ile</div><div class="secenek elden ${s.elden ? 'aktif' : ''}">Elden</div>`;
        cell.querySelector('.acma-kat')?.insertAdjacentElement('afterend', ex);
      }
    }

    function saveState() {
      if (!mode) return;
      storageSet(LS_KEY, JSON.stringify(serializeState()));
    }

    function loadState() {
      const raw = storageGet(LS_KEY);
      if (!raw) return false;
      try {
        const s = JSON.parse(raw);
        if (!s?.mode || !Array.isArray(s.rows)) return false;
        mode = s.mode;
        modeWrap.classList.add('hidden');
        gameWrap.classList.remove('hidden');
        modeLabel.textContent = mode === 'player' ? 'Mod: Oyuncu Bazlı' : 'Mod: Takım Bazlı';

        buildTable({ names: s.names || [], rowCount: s.rows.length || 1 });

        const domRows = scoreTable.querySelectorAll('tbody tr');
        s.rows.forEach((rowState, rIdx) => {
          const domCells = domRows[rIdx]?.querySelectorAll('.player-cell') || [];
          rowState.forEach((cellState, cIdx) => {
            if (domCells[cIdx]) applyCellState(domCells[cIdx], cellState);
          });
        });

        scoreTable.querySelectorAll('tbody tr').forEach(refreshBittiVisibility);
        applyRowLocks();
        calculateScores();
        return true;
      } catch {
        return false;
      }
    }

    function startGame(selectedMode) {
      mode = selectedMode;
      modeWrap.classList.add('hidden');
      gameWrap.classList.remove('hidden');
      modeLabel.textContent = mode === 'player' ? 'Mod: Oyuncu Bazlı' : 'Mod: Takım Bazlı';
      buildTable();
      scoreTable.querySelectorAll('tbody tr').forEach(refreshBittiVisibility);
      applyRowLocks();
      calculateScores();
      saveState();
    }

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.secenek, .masa-btn, .artir, .azalt');
      if (!btn || btn.classList.contains('pasif')) return;

      if (btn.dataset.role === 'acmadi') handleAcmadi(btn);
      else if (btn.dataset.role === 'kalan') handleKalan(btn);
      else if (btn.dataset.role === 'bitti') {
        handleBitti(btn);
        const row = btn.closest('tr');
        if (row) applyPlayerMateVisibility(row);
      }
      else if (btn.classList.contains('okey') || btn.classList.contains('elden')) btn.classList.toggle('aktif');
      else if (btn.classList.contains('masa-btn')) btn.classList.toggle('aktif');
      else if (btn.classList.contains('artir') || btn.classList.contains('azalt')) {
        const sp = btn.closest('.ceza-satiri')?.querySelector('span');
        let v = parseInt(sp?.textContent || '0', 10) || 0;
        if (btn.classList.contains('artir')) v += 1;
        else v = Math.max(0, v - 1);
        if (sp) sp.textContent = String(v);
      }

      setTimeout(afterAnyChange, 0);
    });

    document.addEventListener('input', (e) => {
      if (e.target.classList.contains('name-input') || e.target.classList.contains('kalan-input')) afterAnyChange();
    });

    document.getElementById('btnOyuncu').addEventListener('click', () => startGame('player'));
    document.getElementById('btnTakim').addEventListener('click', () => startGame('team'));
    document.getElementById('btnYeniOyun').addEventListener('click', () => {
      storageRemove(LS_KEY);
      location.reload();
    });

    loadState();
  </script>
</body>
</html>
